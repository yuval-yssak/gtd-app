name: Deploy Client

on:
    push:
        branches: [staging, production]
        paths: ['client/**']
    workflow_dispatch:
        inputs:
            environment:
                description: Target environment
                required: true
                default: production
                type: choice
                options: [production, staging]

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment: ${{ inputs.environment || github.ref_name }}
        defaults:
            run:
                working-directory: client

        env:
            TARGET_ENV: ${{ inputs.environment || github.ref_name }}

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v4
              with:
                  node-version: 24

            - run: npm install

            - run: VITE_API_SERVER=${{ secrets.VITE_API_SERVER }} npm run build

            - name: Deploy to Cloudflare Pages
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: pages deploy dist --project-name=gtd-app --branch=${{ env.TARGET_ENV }}
                  workingDirectory: client
