name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main, staging, production]

jobs:
    check:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: api-server
        services:
            mongodb:
                image: mongo:8
                ports:
                    - 27017:27017
        env:
            MONGO_DB_URL: mongodb://localhost:27017
            # Dummy OAuth credentials — real values not needed; actual HTTP calls are mocked in tests
            GOOGLE_OAUTH_APP_CLIENT_ID: test-google-client-id
            GOOGLE_OAUTH_APP_CLIENT_SECRET: test-google-client-secret
            GITHUB_CLIENT_ID: test-github-client-id
            GITHUB_CLIENT_SECRET: test-github-client-secret
            BETTER_AUTH_SECRET: test-better-auth-secret
            BETTER_AUTH_URL: http://localhost:4000
            CLIENT_URL: http://localhost:4173
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: api-server/package-lock.json
            # npm ci fails on macOS-generated lock files because optional WASM packages
            # (cpu: wasm32 chain: rolldown → @rolldown/binding-wasm32-wasi → @napi-rs/wasm-runtime)
            # record peer dep references without resolving them on macOS, making the lock file
            # structurally inconsistent per npm ci's validator. npm install skips that check.
            - run: npm install
            - run: npm run typecheck   # tsc --noEmit
            - run: npm run lint        # biome lint + format
            - run: npm test          # vitest
