name: Deploy API

on:
    push:
        branches: [staging, production]
        paths: ['api-server/**']
    # Allow manual deploys (e.g. to pick up secret changes without touching api-server code)
    workflow_dispatch:
        inputs:
            environment:
                description: Target environment
                required: true
                default: production
                type: choice
                options: [production, staging]

env:
    REGION: us-central1
    REGISTRY: us-central1-docker.pkg.dev

jobs:
    deploy:
        runs-on: ubuntu-latest
        # Selects the GitHub Environment by branch name (push) or manual input (workflow_dispatch).
        # Each environment holds its own GCP secrets; 'production' has Required reviewers set.
        environment: ${{ inputs.environment || github.ref_name }}
        permissions:
            contents: read
            id-token: write

        env:
            PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
            # inputs.environment is set on manual dispatch; github.ref_name is used on push
            TARGET_ENV: ${{ inputs.environment || github.ref_name }}

        steps:
            - uses: actions/checkout@v6

            - id: auth
              uses: google-github-actions/auth@v3
              with:
                  workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
                  service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

            - uses: google-github-actions/setup-gcloud@v3

            - run: gcloud auth configure-docker ${{ env.REGISTRY }}

            - name: Build and push
              run: |
                  SERVICE=${{ env.TARGET_ENV == 'production' && 'gtd-api' || 'gtd-api-staging' }}
                  IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/gtd/$SERVICE:${{ github.sha }}
                  # Build from repo root so Docker can access the monorepo root package-lock.json
                  docker build -f api-server/Dockerfile --build-arg COMMIT_HASH=${GITHUB_SHA::7} -t $IMAGE .
                  docker push $IMAGE
                  echo "IMAGE=$IMAGE" >> $GITHUB_ENV
                  echo "SERVICE=$SERVICE" >> $GITHUB_ENV

            - name: Deploy to Cloud Run
              run: |
                  # Write env vars to a YAML file to safely handle special characters in values
                  cat > env.yaml << 'EOF'
                  NODE_ENV: production
                  MONGO_DB_URL: "${{ secrets.MONGO_DB_URL }}"
                  MONGO_DB_NAME: "${{ vars.MONGO_DB_NAME }}"
                  GOOGLE_OAUTH_APP_CLIENT_ID: "${{ secrets.GOOGLE_OAUTH_APP_CLIENT_ID }}"
                  GOOGLE_OAUTH_APP_CLIENT_SECRET: "${{ secrets.GOOGLE_OAUTH_APP_CLIENT_SECRET }}"
                  GITHUB_CLIENT_ID: "${{ secrets.GH_OAUTH_CLIENT_ID }}"
                  GITHUB_CLIENT_SECRET: "${{ secrets.GH_OAUTH_CLIENT_SECRET }}"
                  BETTER_AUTH_SECRET: "${{ secrets.BETTER_AUTH_SECRET }}"
                  BETTER_AUTH_URL: "${{ vars.BETTER_AUTH_URL }}"
                  CLIENT_URL: "${{ vars.CLIENT_URL }}"
                  VAPID_PRIVATE_KEY: "${{ secrets.VAPID_PRIVATE_KEY }}"
                  VAPID_PUBLIC_KEY: "${{ vars.VAPID_PUBLIC_KEY }}"
                  VAPID_SUBJECT: "${{ vars.VAPID_SUBJECT }}"
                  EOF
                  gcloud run deploy $SERVICE \
                    --image=$IMAGE \
                    --region=${{ env.REGION }} \
                    --platform=managed \
                    --allow-unauthenticated \
                    --env-vars-file=env.yaml
