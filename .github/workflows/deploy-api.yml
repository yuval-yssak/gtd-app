name: Deploy API

on:
    push:
        branches: [staging, production]
        paths: ['api-server/**']

env:
    REGION: us-central1
    REGISTRY: us-central1-docker.pkg.dev

jobs:
    deploy:
        runs-on: ubuntu-latest
        # Selects the GitHub Environment by branch name — each holds its own GCP secrets;
        # the 'production' environment has Required reviewers set, which pauses the deploy until manually approved.
        environment: ${{ github.ref_name }}
        permissions:
            contents: read
            id-token: write

        env:
            PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
            SERVICE: ${{ github.ref_name == 'production' && 'gtd-api' || 'gtd-api-staging' }}

        steps:
            - uses: actions/checkout@v4

            - id: auth
              uses: google-github-actions/auth@v2
              with:
                  workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
                  service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

            - uses: google-github-actions/setup-gcloud@v2

            - run: gcloud auth configure-docker ${{ env.REGISTRY }}

            - name: Build and push
              run: |
                  IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/gtd/${{ env.SERVICE }}:${{ github.sha }}
                  # Build from repo root so Docker can access the monorepo root package-lock.json
                  docker build -f api-server/Dockerfile -t $IMAGE .
                  docker push $IMAGE
                  echo "IMAGE=$IMAGE" >> $GITHUB_ENV

            - name: Deploy to Cloud Run
              run: |
                  # Write env vars to a YAML file to safely handle special characters in values
                  cat > env.yaml << 'EOF'
                  NODE_ENV: production
                  MONGO_DB_URL: "${{ secrets.MONGO_DB_URL }}"
                  MONGO_DB_NAME: "${{ secrets.MONGO_DB_NAME }}"
                  GOOGLE_OAUTH_APP_CLIENT_ID: "${{ secrets.GOOGLE_OAUTH_APP_CLIENT_ID }}"
                  GOOGLE_OAUTH_APP_CLIENT_SECRET: "${{ secrets.GOOGLE_OAUTH_APP_CLIENT_SECRET }}"
                  GITHUB_CLIENT_ID: "${{ secrets.GH_OAUTH_CLIENT_ID }}"
                  GITHUB_CLIENT_SECRET: "${{ secrets.GH_OAUTH_CLIENT_SECRET }}"
                  BETTER_AUTH_SECRET: "${{ secrets.BETTER_AUTH_SECRET }}"
                  BETTER_AUTH_URL: "${{ secrets.BETTER_AUTH_URL }}"
                  CLIENT_URL: "${{ secrets.CLIENT_URL }}"
                  EOF
                  gcloud run deploy ${{ env.SERVICE }} \
                    --image=$IMAGE \
                    --region=${{ env.REGION }} \
                    --platform=managed \
                    --allow-unauthenticated \
                    --env-vars-file=env.yaml
