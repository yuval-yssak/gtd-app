name: Deploy API

on:
    push:
        branches: [staging, production]
        paths: ['api-server/**']

env:
    REGION: us-central1
    REGISTRY: us-central1-docker.pkg.dev

jobs:
    deploy:
        runs-on: ubuntu-latest
        # Selects the GitHub Environment by branch name — each holds its own GCP secrets;
        # the 'production' environment has Required reviewers set, which pauses the deploy until manually approved.
        environment: ${{ github.ref_name }}
        permissions:
            contents: read
            id-token: write

        env:
            PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
            SERVICE: ${{ github.ref_name == 'production' && 'gtd-api' || 'gtd-api-staging' }}

        steps:
            - uses: actions/checkout@v4

            - id: auth
              uses: google-github-actions/auth@v2
              with:
                  workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
                  service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

            - uses: google-github-actions/setup-gcloud@v2

            - run: gcloud auth configure-docker ${{ env.REGISTRY }}

            - name: Build and push
              working-directory: api-server
              run: |
                  IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/gtd/${{ env.SERVICE }}:${{ github.sha }}
                  docker build -t $IMAGE .
                  docker push $IMAGE
                  echo "IMAGE=$IMAGE" >> $GITHUB_ENV

            - name: Deploy to Cloud Run
              run: |
                  gcloud run deploy ${{ env.SERVICE }} \
                    --image=$IMAGE \
                    --region=${{ env.REGION }} \
                    --platform=managed \
                    --allow-unauthenticated \
                    --set-env-vars="NODE_ENV=production"
